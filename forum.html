<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- single fixed cream/purple theme -->
  <title>Forum — Prime Education Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/rtl.css" />
  <link rel="icon" type="image/png" href="logo_prime.png" />
</head>
<body>
  <div class="bg-grid"></div>
  <div id="nav-root"></div>

  <section class="page-head">
    <div class="container">
      <h1 data-i18n="forumPage.title"></h1>
      <p data-i18n="forumPage.lead"></p>
    </div>
  </section>

  <section class="section" style="padding-top:24px">
    <div class="container">
      <div class="forum-layout">
        <aside class="forum-cats" id="forum-cats"></aside>
        <div>
          <div class="forum-toolbar" id="forum-toolbar"></div>
          <div class="threads" id="forum-threads"></div>
          <p class="forum-note" data-i18n="forumPage.note"></p>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="i18n/en.js"></script>
  <script src="i18n/ar.js"></script>
  <script src="i18n/fr.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/forum.js"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
