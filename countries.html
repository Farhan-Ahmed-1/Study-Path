<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- single fixed cream/purple theme -->
  <title>Destinations — Prime Education Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/rtl.css" />
  <link rel="icon" type="image/png" href="logo_prime.png" />
</head>
<body>
  <div class="bg-grid"></div>
  <div id="nav-root"></div>

  <section class="page-head">
    <div class="container">
      <h1 data-i18n="countriesPage.title"></h1>
      <p data-i18n="countriesPage.lead"></p>
    </div>
  </section>

  <section class="section" style="padding-top:24px">
    <div class="container">
      <div class="grid grid-3" id="countries-list"></div>
    </div>
  </section>

  <section class="section" style="padding-top:0">
    <div class="container">
      <div class="cta-band reveal">
        <h2 data-i18n="common.readyTitle"></h2>
        <p data-i18n="common.readyLead"></p>
        <a href="assessment.html" class="btn btn-primary btn-lg" data-i18n="common.getStarted"></a>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>

  <script src="i18n/en.js"></script>
  <script src="i18n/ar.js"></script>
  <script src="i18n/fr.js"></script>
  <script src="i18n/es.js"></script>
  <script src="i18n/hi.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/countries.js"></script>
  <script src="js/components.js"></script>
  <script>
    function drawCountries() { if (window.Countries) window.Countries.renderList("countries-list"); }
    window.addEventListener("components:ready", drawCountries);
    window.addEventListener("languagechange", drawCountries);
  </script>
</body>
</html>
