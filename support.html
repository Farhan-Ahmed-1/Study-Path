<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How We Support You Abroad — Prime Education Group</title>
  <meta name="description" content="We don't stop at preparation. Prime Education Group arranges your accommodation, every basic need, and stands by you through the whole journey abroad." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/rtl.css" />
  <link rel="icon" type="image/png" href="logo_prime.png" />
  <style>
    /* classroom.jpg background, blended under a soft brand-blue veil so the
       photo reads as gentle texture while the dark section text stays legible. */
    .sp-bg-head { position: relative; overflow: hidden; isolation: isolate; }
    .sp-bg-head::before {
      content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        linear-gradient(180deg, rgba(244, 243, 255, 0.92) 0%, rgba(213, 211, 243, 0.88) 50%, rgba(88, 82, 214, 0.26) 100%),
        radial-gradient(70% 90% at 50% -10%, rgba(88, 82, 214, 0.20), transparent 62%),
        url("classroom.jpg") center / cover no-repeat;
    }
    .sp-bg-head > .container { position: relative; z-index: 1; }
    /* Darken the lead copy so it reads cleanly over the photo. */
    .sp-bg-head p { color: var(--navy-800); }
    /* support_1.jpg under the same brand-blue veil so the cards lift cleanly
       off a soft, on-theme backdrop. */
    .sp-bg-pillars { position: relative; overflow: hidden; isolation: isolate; }
    .sp-bg-pillars::before {
      content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        linear-gradient(180deg, rgba(244, 243, 255, 0.90) 0%, rgba(216, 214, 244, 0.86) 50%, rgba(88, 82, 214, 0.22) 100%),
        radial-gradient(80% 70% at 50% 0%, rgba(88, 82, 214, 0.16), transparent 60%),
        url("support_1.jpg") center / cover no-repeat;
    }
    .sp-bg-pillars > .container { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div id="nav-root"></div>

  <!-- ===================== PAGE HEAD ===================== -->
  <section class="page-head sp-bg-head">
    <div class="container">
      <span class="eyebrow" data-i18n="support.eyebrow"></span>
      <h1 data-i18n="support.title"></h1>
      <p data-i18n="support.lead"></p>
    </div>
  </section>

  <!-- ===================== PROMISE ===================== -->
  <section class="section" style="padding-top:24px">
    <div class="container">
      <div class="card reveal" style="text-align:center;max-width:880px;margin-inline:auto">
        <h2 class="section-title" style="margin-bottom:12px" data-i18n="support.promise.title"></h2>
        <p class="section-lead" style="margin-inline:auto" data-i18n="support.promise.text"></p>
      </div>
    </div>
  </section>

  <!-- ===================== SUPPORT PILLARS ===================== -->
  <section class="section" style="padding-top:0">
    <div class="container">
      <div class="center reveal">
        <span class="eyebrow" data-i18n="support.pillars.eyebrow"></span>
        <h2 class="section-title" data-i18n="support.pillars.title"></h2>
        <p class="section-lead" data-i18n="support.pillars.lead"></p>
      </div>
      <div class="grid grid-3 mt-4">
        <div class="card feature reveal">
          <div class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 21v-6h6v6"/></svg></div>
          <h3 data-i18n="support.pillars.p1t"></h3><p data-i18n="support.pillars.p1d"></p>
        </div>
        <div class="card feature reveal">
          <div class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"/><path d="M21 3l-9 9"/><path d="M21 14v5a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h5"/></svg></div>
          <h3 data-i18n="support.pillars.p2t"></h3><p data-i18n="support.pillars.p2d"></p>
        </div>
        <div class="card feature reveal">
          <div class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2l1.5 5h9L18 2"/><path d="M5 7h14l-1.2 12.2a2 2 0 01-2 1.8H8.2a2 2 0 01-2-1.8z"/></svg></div>
          <h3 data-i18n="support.pillars.p3t"></h3><p data-i18n="support.pillars.p3d"></p>
        </div>
        <div class="card feature reveal">
          <div class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20M6 15h4"/></svg></div>
          <h3 data-i18n="support.pillars.p4t"></h3><p data-i18n="support.pillars.p4d"></p>
        </div>
        <div class="card feature reveal">
          <div class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.7 3 6 3s6-2 6-3v-5"/></svg></div>
          <h3 data-i18n="support.pillars.p5t"></h3><p data-i18n="support.pillars.p5d"></p>
        </div>
        <div class="card feature reveal">
          <div class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 01-.9-3.8 8.5 8.5 0 014.7-7.6A8.4 8.4 0 0112.5 3H13a8.5 8.5 0 018 8z"/></svg></div>
          <h3 data-i18n="support.pillars.p6t"></h3><p data-i18n="support.pillars.p6d"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== ACCOMMODATION HIGHLIGHT ===================== -->
  <section class="section alt sp-bg-pillars" style="padding-top:0">
    <div class="container">
      <div class="grid grid-2 mt-4" style="align-items:center;gap:40px">
        <div class="reveal">
          <span class="eyebrow" data-i18n="support.accom.eyebrow"></span>
          <h2 class="section-title" data-i18n="support.accom.title"></h2>
          <p class="section-lead" data-i18n="support.accom.text"></p>
          <a href="contact.html" class="btn btn-primary btn-lg mt-3" data-i18n="support.accom.cta"></a>
        </div>
        <div class="card reveal">
          <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:16px" data-i18n="support.accom.listTitle"></h3>
          <ul class="check-list">
            <li data-i18n="support.accom.l1"></li>
            <li data-i18n="support.accom.l2"></li>
            <li data-i18n="support.accom.l3"></li>
            <li data-i18n="support.accom.l4"></li>
            <li data-i18n="support.accom.l5"></li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== HOW SUPPORT WORKS ===================== -->
  <section class="section" style="padding-top:0">
    <div class="container">
      <div class="center reveal">
        <span class="eyebrow" data-i18n="support.steps.eyebrow"></span>
        <h2 class="section-title" data-i18n="support.steps.title"></h2>
        <p class="section-lead" data-i18n="support.steps.lead"></p>
      </div>
      <div class="grid grid-4 steps mt-4">
        <div class="card step-card reveal"><h3 data-i18n="support.steps.s1t"></h3><p class="text-dim" data-i18n="support.steps.s1d"></p></div>
        <div class="card step-card reveal"><h3 data-i18n="support.steps.s2t"></h3><p class="text-dim" data-i18n="support.steps.s2d"></p></div>
        <div class="card step-card reveal"><h3 data-i18n="support.steps.s3t"></h3><p class="text-dim" data-i18n="support.steps.s3d"></p></div>
        <div class="card step-card reveal"><h3 data-i18n="support.steps.s4t"></h3><p class="text-dim" data-i18n="support.steps.s4d"></p></div>
      </div>
    </div>
  </section>

  <!-- ===================== CTA BAND ===================== -->
  <section class="section" style="padding-top:0">
    <div class="container">
      <div class="cta-band reveal">
        <h2 data-i18n="support.cta.title"></h2>
        <p data-i18n="support.cta.lead"></p>
        <a href="assessment.html" class="btn btn-primary btn-lg" data-i18n="support.cta.btn"></a>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>

  <script src="i18n/en.js"></script>
  <script src="i18n/ar.js"></script>
  <script src="i18n/fr.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
