<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- single fixed cream/purple theme -->
  <title>Country — Prime Education Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/rtl.css" />
  <link rel="icon" type="image/png" href="logo_prime.png" />
</head>
<body>
  <div class="bg-grid"></div>
  <div id="nav-root"></div>

  <section class="section" style="padding-top:48px"><div id="country-detail"></div></section>

  <div id="footer-root"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="i18n/en.js"></script>
  <script src="i18n/ar.js"></script>
  <script src="i18n/fr.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/countries.js"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
  <script>
    function drawDetail() { if (window.Countries) window.Countries.renderDetail("country-detail"); }
    window.addEventListener("components:ready", drawDetail);
    window.addEventListener("languagechange", drawDetail);
    window.addEventListener("countries:ready", drawDetail);
  </script>
</body>
</html>
