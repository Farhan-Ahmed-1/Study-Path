<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- single fixed cream/purple theme -->
  <title>Assessment — Prime Education Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/rtl.css" />
  <link rel="icon" type="image/png" href="logo_prime.png" />
</head>
<body>
  <div class="bg-grid"></div>
  <div id="nav-root"></div>

  <!-- SVG gradient for the score ring -->
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a18" /><stop offset="100%" stop-color="#ffb347" />
    </linearGradient>
  </defs></svg>

  <!-- Intro -->
  <section class="page-head" style="padding-bottom:0">
    <div class="container">
      <h1 data-i18n="assessment.page.title"></h1>
      <p data-i18n="assessment.page.lead"></p>
      <div class="flex gap wrap center-y" style="justify-content:center;margin-top:22px">
        <span class="eyebrow" data-i18n="assessment.page.tag1"></span>
        <span class="eyebrow" data-i18n="assessment.page.tag2"></span>
        <span class="eyebrow" data-i18n="assessment.page.tag3"></span>
      </div>
    </div>
  </section>

  <!-- Wizard -->
  <section class="section" style="padding-top:36px">
    <div class="container assess-wrap">
      <div class="assess-shell">
        <div class="assess-top" id="assess-top">
          <span class="pill" data-i18n="assessment.minutes"></span>
          <span class="pill" data-i18n="assessment.stepsCount"></span>
          <span class="spacer"></span>
          <span class="pill" data-i18n="assessment.brandTag"></span>
        </div>

        <div class="assess-progress" id="assess-progress">
          <div class="row">
            <span id="assess-pct">8%</span>
            <span><span data-i18n="assessment.stepWord"></span> <b id="assess-stepnow">1</b> <span data-i18n="assessment.of"></span> 13</span>
          </div>
          <div class="progress-track"><div class="progress-bar" id="assess-bar"></div></div>
        </div>

        <div class="assess-body" id="assess-body"></div>

        <div class="assess-foot" id="assess-foot">
          <button class="btn btn-ghost" id="assess-back"><span data-i18n="assessment.back"></span></button>
          <button class="btn btn-primary" id="assess-next"><span></span></button>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>

  <script src="i18n/en.js"></script>
  <script src="i18n/ar.js"></script>
  <script src="i18n/fr.js"></script>
  <script src="i18n/es.js"></script>
  <script src="i18n/hi.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/assessment.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
