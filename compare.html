<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare destinations — Prime Education Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/rtl.css" />
  <link rel="icon" type="image/png" href="logo_prime.png" />
  <style>
    .compare-selects { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    @media (max-width: 760px) { .compare-selects { grid-template-columns: 1fr; } }
    .compare-selects select { width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong);
      border-radius: 10px; font-family: inherit; font-size: 0.95rem; color: var(--text); background: #fff; }
    .compare-table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid var(--border-strong);
      border-radius: var(--radius); overflow: hidden; }
    .compare-table th, .compare-table td { text-align: start; padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.94rem; }
    .compare-table thead th { background: var(--surface-2); font-weight: 700; color: var(--navy-800); }
    .compare-table tbody th { font-weight: 600; color: var(--text-dim); background: var(--surface-2); width: 200px; }
    .compare-table tbody tr:last-child td, .compare-table tbody tr:last-child th { border-bottom: 0; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div id="nav-root"></div>

  <section class="page-head">
    <div class="container">
      <h1 data-i18n="comparePage.title"></h1>
      <p data-i18n="comparePage.lead"></p>
    </div>
  </section>

  <section class="section" style="padding-top:24px">
    <div class="container">
      <div class="compare-selects" id="compare-selects"></div>
      <div id="compare-result"></div>
    </div>
  </section>

  <section class="section" style="padding-top:0">
    <div class="container">
      <div class="cta-band reveal in">
        <h2 data-i18n="common.readyTitle"></h2>
        <p data-i18n="common.readyLead"></p>
        <a href="assessment.html" class="btn btn-primary btn-lg" data-i18n="common.getStarted"></a>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="i18n/en.js"></script>
  <script src="i18n/ar.js"></script>
  <script src="i18n/fr.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/countries.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
